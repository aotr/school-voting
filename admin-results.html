<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>Admin Results</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <main class="machine-shell">
    <section class="machine-panel admin-panel">
      <header class="panel-header admin-header">
        <div>
          <p class="eyebrow">School Election Admin</p>
          <h1>Results And Winner</h1>
        </div>
        <div class="status-cluster">
          <a class="admin-link" href="./index.html">Back To Voting</a>
        </div>
      </header>

      <section class="admin-dashboard">
        <nav class="card-block admin-menu" aria-label="Admin menu">
          <a class="menu-link" href="./admin.html">Home</a>
          <a class="menu-link" href="./admin-election.html">Election</a>
          <a class="menu-link" href="./admin-security.html">Security</a>
          <a class="menu-link" href="./admin-candidates.html">Candidates</a>
          <a class="menu-link is-active" href="./admin-results.html">Results</a>
          <a class="menu-link" href="./admin-backup.html">Backup</a>
          <button class="menu-link logout-link" id="logout-button" type="button">Logout</button>
        </nav>

        <section class="card-block">
          <h2>Results Snapshot</h2>
          <button class="reset-button" id="refresh-results-button" type="button">🔄 Refresh Now</button>
          <div id="results-list" class="results-list"></div>
        </section>

        <section class="card-block winner-card">
          <h2>Winner</h2>
          <div id="winner-panel" class="winner-panel"></div>
        </section>

        <section class="card-block">
          <h2>Voting History</h2>
          <p class="support-text">List of all votes cast. You can reset individual votes or all votes.</p>
          <div id="votes-history" class="votes-history"></div>
          <div class="action-row">
            <button class="reset-button" id="reset-single-vote-button" type="button" style="display:none;">Reset Selected Vote</button>
            <button class="reset-button danger-button" id="reset-all-votes-button" type="button">Reset All Votes</button>
          </div>
          <div class="message-box" id="votes-message">Showing all votes cast during this session.</div>
        </section>
      </section>
    </section>
  </main>

  <script src="./storage.js"></script>
  <script src="./admin-common.js"></script>
  <script src="./admin-results.js"></script>
</body>
</html>
