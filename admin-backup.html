<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>Admin Backup</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <main class="machine-shell">
    <section class="machine-panel admin-panel">
      <header class="panel-header admin-header">
        <div>
          <p class="eyebrow">School Election Admin</p>
          <h1>Backup</h1>
        </div>
        <div class="status-cluster">
          <a class="admin-link" href="./index.html">Back To Voting</a>
        </div>
      </header>

      <section class="admin-dashboard">
        <nav class="card-block admin-menu" aria-label="Admin menu">
          <a class="menu-link" href="./admin.html">Home</a>
          <a class="menu-link" href="./admin-election.html">Election</a>
          <a class="menu-link" href="./admin-security.html">Security</a>
          <a class="menu-link" href="./admin-candidates.html">Candidates</a>
          <a class="menu-link" href="./admin-results.html">Results</a>
          <a class="menu-link is-active" href="./admin-backup.html">Backup</a>
          <button class="menu-link logout-link" id="logout-button" type="button">Logout</button>
        </nav>

        <section class="card-block">
          <h2>Backup</h2>
          <p class="support-text">Export the full local prototype data as a backup file or reset the demo.</p>
          <div class="stack-form">
            <button class="reset-button" id="export-button" type="button">Export Backup</button>
            <button class="reset-button danger-button" id="reset-demo-button" type="button">Reset Demo Data</button>
          </div>
          <div class="message-box" id="backup-message">This admin panel currently stores data in the browser for prototype use.</div>
        </section>
      </section>
    </section>
  </main>

  <script src="./storage.js"></script>
  <script src="./admin-common.js"></script>
  <script src="./admin-backup.js"></script>
</body>
</html>
