<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Election Settings</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <main class="machine-shell">
    <section class="machine-panel admin-panel">
      <header class="panel-header admin-header">
        <div>
          <p class="eyebrow">School Election Admin</p>
          <h1>Election Settings</h1>
        </div>
        <div class="status-cluster">
          <a class="admin-link" href="./index.html">Back To Voting</a>
        </div>
      </header>

      <section class="admin-dashboard">
        <nav class="card-block admin-menu" aria-label="Admin menu">
          <a class="menu-link" href="./admin.html">Home</a>
          <a class="menu-link is-active" href="./admin-election.html">Election</a>
          <a class="menu-link" href="./admin-security.html">Security</a>
          <a class="menu-link" href="./admin-candidates.html">Candidates</a>
          <a class="menu-link" href="./admin-results.html">Results</a>
          <a class="menu-link" href="./admin-backup.html">Backup</a>
          <button class="menu-link logout-link" id="logout-button" type="button">Logout</button>
        </nav>

        <section class="card-block">
          <h2>Election Settings</h2>
          <form id="election-form" class="stack-form">
            <label class="field">
              <span>Election Title</span>
              <input id="election-title-input" type="text" required>
            </label>
            <label class="field">
              <span>Election Year</span>
              <input id="election-year-input" type="number" min="2025" max="2100" required>
            </label>
            <label class="toggle-field">
              <input id="voting-open-input" type="checkbox">
              <span>Voting Open</span>
            </label>
            <button class="reset-button" type="submit">Save Election Settings</button>
          </form>
          <div class="message-box" id="security-message">Update the main election information here.</div>
        </section>
      </section>
    </section>
  </main>

  <script src="./storage.js"></script>
  <script src="./admin-common.js"></script>
  <script src="./admin-election.js"></script>
</body>
</html>
